[project]
name = "rubric-app"
version = "0.1.0"
description = "Python SDK for Rubric — runtime governance for AI agents"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
license-files = ["LICENSE"]
authors = [{ name = "Rubric", email = "support@rubric-app.com" }]
keywords = [
    "rubric",
    "ai-agents",
    "ai-safety",
    "policy-engine",
    "audit",
    "security",
    "guardrails",
    "langchain",
    "mcp",
    "claude",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Monitoring",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
    "pyyaml>=6.0",
    "pydantic>=2.5",
    # `regex` is a drop-in for the stdlib `re` module that supports a
    # `timeout=` kwarg, so a catastrophic-backtracking pattern aborts
    # within a bounded budget instead of hanging the agent process.
    "regex>=2024.9.11",
]

[project.urls]
Homepage = "https://rubric-app.com"
Documentation = "https://docs.rubric-app.com"
Repository = "https://github.com/getrubric/sdk"
Issues = "https://github.com/getrubric/sdk/issues"
Dashboard = "https://app.rubric-app.com"

[project.optional-dependencies]
langchain = [
    "langchain>=0.3.0",
    "langchain-core>=0.3.0",
]
claude-agent = [
    "claude-agent-sdk>=0.1.0",
]
mcp = [
    "mcp>=1.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.6.0",
    "mypy>=1.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rubric"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]
